<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <style>
        /* Reset cơ bản và thiết lập font chữ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        /* Container chính giữa màn hình */
        .container {
            padding: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Cấu hình chữ */
        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        /* Hiệu ứng thanh gạch ngang trang trí */
        .divider {
            width: 80px;
            height: 4px;
            background-color: #ff7675;
            margin: 0 auto 20px auto;
            border-radius: 2px;
        }

        /* Hiệu ứng xuất hiện mượt mà */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hỗ trợ hiển thị tốt trên điện thoại */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Coming Soon</h1>
        <div class="divider"></div>
        <p>Chúng tôi đang hoàn thiện trang web. Hãy quay lại sau nhé!</p>
    </div>

</body>
</html>
