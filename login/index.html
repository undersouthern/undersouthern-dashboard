<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UNDERSOUTHERN</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/phvinh1968-a11y/my-images/main/logoblack.png">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #2f3542; --bg: #ebedef; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Public Sans', sans-serif; }
        body { background-color: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 48px; border-radius: 4px; width: 100%; max-width: 400px; border: 1px solid #d8dbe0; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .logo-box { margin-bottom: 30px; }
        .logo-box img { max-height: 45px; margin-bottom: 10px; }
        .logo-box h1 { font-size: 20px; font-weight: 700; color: var(--dark); letter-spacing: 1px; }
        .input-group { margin-bottom: 24px; text-align: left; }
        .input-group label { display: block; font-size: 11px; font-weight: 600; color: #768192; margin-bottom: 10px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 1px solid #d8dbe0; border-radius: 2px; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--dark); }
        button { width: 100%; padding: 14px; background: var(--dark); color: white; border: none; border-radius: 2px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #1e242d; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">
            <img src="https://raw.githubusercontent.com/phvinh1968-a11y/my-images/main/logoblack.png" alt="image_480620.png">
            <h1>UNDERSOUTHERN</h1>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="artist@undersouthern.asia" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••••••" required>
            </div>
            <button type="submit" id="loginBtn">LOGIN</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const emailInput = document.getElementById('email').value.trim();
            const passInput = document.getElementById('password').value.trim();
            
            btn.innerText = 'LOADING...';
            btn.disabled = true;

            const SHEET_ID = '1V0jSbi9e04Woe2QG_4F7Ei2NKh-fdrNaqATN3MEEBcY';
            const API_KEY = 'AIzaSyDf8l3PCdLdB-CcW8E03ekUFsVhQgtLWoo';
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1!B2:C100?key=${API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // Cột B (index 0) là email, Cột C (index 1) là password
                const user = data.values.find(row => row[0] === emailInput && String(row[1]) === passInput);

                if (user) {
                    localStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userEmail', emailInput);
                    window.location.href = "/royalty-portal/overview?";
                } else {
                    alert("Sai email hoặc mật khẩu!");
                    btn.innerText = 'LOGIN';
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert("Lỗi kết nối tới hệ thống.");
                btn.innerText = 'LOGIN';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
